AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS Managed Microsoft AD deployment in existing VPC.
  Creates a Managed AD directory for user authentication and LDAP federation with Keycloak.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Existing VPC ID where Managed AD will be deployed

  PrivateSubnet1Id:
    Type: AWS::EC2::Subnet::Id
    Description: First private subnet (AZ-a) for AD domain controllers

  PrivateSubnet2Id:
    Type: AWS::EC2::Subnet::Id
    Description: Second private subnet (AZ-b) for AD domain controllers

  DomainName:
    Type: String
    Default: corp.example.com
    Description: Fully qualified domain name for the directory (e.g., corp.example.com)

  DomainShortName:
    Type: String
    Default: CORP
    Description: NetBIOS name for the directory (e.g., CORP)

  AdminPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 64
    Description: Password for the directory Admin user

  Edition:
    Type: String
    Default: Standard
    AllowedValues:
      - Standard
      - Enterprise
    Description: >
      Standard (up to 5,000 users, ~$0.073/hr) or 
      Enterprise (up to 500,000 users, ~$0.219/hr)

Resources:
  # Security Group for Managed AD
  ManagedADSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for AWS Managed Microsoft AD
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: managed-ad-sg

  # Allow LDAP (389) from VPC CIDR
  ManagedADIngressLDAP:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref ManagedADSecurityGroup
      IpProtocol: tcp
      FromPort: 389
      ToPort: 389
      CidrIp: 10.0.0.0/8
      Description: LDAP from VPC

  # Allow LDAPS (636) from VPC CIDR
  ManagedADIngressLDAPS:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref ManagedADSecurityGroup
      IpProtocol: tcp
      FromPort: 636
      ToPort: 636
      CidrIp: 10.0.0.0/8
      Description: LDAPS from VPC

  # Allow DNS (53) from VPC CIDR
  ManagedADIngressDNS:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref ManagedADSecurityGroup
      IpProtocol: tcp
      FromPort: 53
      ToPort: 53
      CidrIp: 10.0.0.0/8
      Description: DNS TCP from VPC

  ManagedADIngressDNSUDP:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref ManagedADSecurityGroup
      IpProtocol: udp
      FromPort: 53
      ToPort: 53
      CidrIp: 10.0.0.0/8
      Description: DNS UDP from VPC

  # Allow Kerberos (88) from VPC CIDR
  ManagedADIngressKerberos:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref ManagedADSecurityGroup
      IpProtocol: tcp
      FromPort: 88
      ToPort: 88
      CidrIp: 10.0.0.0/8
      Description: Kerberos from VPC

  # AWS Managed Microsoft AD
  ManagedAD:
    Type: AWS::DirectoryService::MicrosoftAD
    Properties:
      Name: !Ref DomainName
      ShortName: !Ref DomainShortName
      Password: !Ref AdminPassword
      Edition: !Ref Edition
      VpcSettings:
        VpcId: !Ref VpcId
        SubnetIds:
          - !Ref PrivateSubnet1Id
          - !Ref PrivateSubnet2Id

  # Store AD admin password in Secrets Manager
  ADAdminSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /managed-ad/admin-password
      Description: AWS Managed AD Admin password
      SecretString: !Sub |
        {
          "username": "Admin",
          "password": "${AdminPassword}",
          "domain": "${DomainName}",
          "shortName": "${DomainShortName}"
        }

  # DHCP Options Set for AD DNS resolution
  ADDhcpOptions:
    Type: AWS::EC2::DHCPOptions
    DependsOn: ManagedAD
    Properties:
      DomainName: !Ref DomainName
      DomainNameServers:
        - !Select [0, !GetAtt ManagedAD.DnsIpAddresses]
        - !Select [1, !GetAtt ManagedAD.DnsIpAddresses]
      Tags:
        - Key: Name
          Value: !Sub ${DomainName}-dhcp-options

  # Associate DHCP Options with VPC
  ADDhcpOptionsAssociation:
    Type: AWS::EC2::VPCDHCPOptionsAssociation
    Properties:
      VpcId: !Ref VpcId
      DhcpOptionsId: !Ref ADDhcpOptions

Outputs:
  DirectoryId:
    Description: Directory ID of the Managed AD
    Value: !Ref ManagedAD
    Export:
      Name: !Sub ${AWS::StackName}-DirectoryId

  DnsIpAddress1:
    Description: First DNS IP address of the Managed AD
    Value: !Select [0, !GetAtt ManagedAD.DnsIpAddresses]
    Export:
      Name: !Sub ${AWS::StackName}-DnsIp1

  DnsIpAddress2:
    Description: Second DNS IP address of the Managed AD
    Value: !Select [1, !GetAtt ManagedAD.DnsIpAddresses]
    Export:
      Name: !Sub ${AWS::StackName}-DnsIp2

  DomainName:
    Description: Domain name of the Managed AD
    Value: !Ref DomainName
    Export:
      Name: !Sub ${AWS::StackName}-DomainName

  SecurityGroupId:
    Description: Security Group ID for Managed AD
    Value: !Ref ManagedADSecurityGroup
    Export:
      Name: !Sub ${AWS::StackName}-SecurityGroupId

  AdminSecretArn:
    Description: ARN of the Secrets Manager secret containing AD admin credentials
    Value: !Ref ADAdminSecret
    Export:
      Name: !Sub ${AWS::StackName}-AdminSecretArn
