AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFront distribution fronting the Keycloak ALB. Required so the ALB
  Security Group can avoid 0.0.0.0/0 ingress (Isengard compliance) — only the
  CloudFront origin-facing managed prefix list is allowed to reach the ALB.

  IMPORTANT: this distribution disables caching and forwards everything to the
  origin (cookies, query strings, all headers including Authorization, Host).
  Required for Keycloak which is an interactive IdP / OAuth2 / OIDC server —
  every response is per-user / per-key and MUST NOT be cached at the edge.

Parameters:
  KeycloakDomainName:
    Type: String
    Default: keycloak.example.com
    Description: Public domain name users + IAM Identity Center hit (must match ACM cert SANs)

  CertificateArn:
    Type: String
    Description: >
      ACM certificate ARN that covers KeycloakDomainName. CloudFront REQUIRES the
      certificate be in us-east-1 — our cert is already there.

  AlbDnsName:
    Type: String
    Description: Origin ALB DNS name (e.g. keycloak-alb-xxx.us-east-1.elb.amazonaws.com)

  AlbHostedZoneId:
    Type: String
    Description: ALB canonical hosted zone id (from main stack output ALBHostedZoneId)

  Route53HostedZoneId:
    Type: String
    Description: Route53 hosted zone id for your domain

  OriginAliasName:
    Type: String
    Default: kc-origin.example.com
    Description: >
      Internal alias name CloudFront uses to talk to the ALB. CloudFront
      validates the origin's TLS cert against this name, so the ACM cert
      (*.example.com) MUST cover it. Pick any *.example.com label that
      isn't already in use.

  PriceClass:
    Type: String
    Default: PriceClass_All
    AllowedValues: [PriceClass_All, PriceClass_200, PriceClass_100]
    Description: CloudFront price class (PriceClass_All = global, lowest latency)

Resources:
  # Internal CNAME — gives the ALB a hostname that the wildcard cert covers.
  OriginAliasRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref Route53HostedZoneId
      Name: !Ref OriginAliasName
      Type: A
      AliasTarget:
        HostedZoneId: !Ref AlbHostedZoneId
        DNSName: !Ref AlbDnsName
        EvaluateTargetHealth: false

  KeycloakDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: OriginAliasRecord
    Properties:
      DistributionConfig:
        Comment: !Sub Keycloak IdP for QuickSuite Desktop SSO (${KeycloakDomainName})
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: !Ref PriceClass

        Aliases:
          - !Ref KeycloakDomainName

        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          MinimumProtocolVersion: TLSv1.2_2021
          SslSupportMethod: sni-only

        Origins:
          - Id: keycloak-alb
            DomainName: !Ref OriginAliasName
            CustomOriginConfig:
              # HTTPS-only to ALB; SNI presents OriginAliasName which the ACM
              # cert covers — TLS validates cleanly.
              OriginProtocolPolicy: https-only
              HTTPSPort: 443
              OriginSSLProtocols:
                - TLSv1.2
              OriginReadTimeout: 60
              OriginKeepaliveTimeout: 60

        DefaultCacheBehavior:
          TargetOriginId: keycloak-alb
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          CachedMethods: [GET, HEAD]
          Compress: false
          # AWS-managed CachePolicy "CachingDisabled" — never cache at the edge
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          # AWS-managed OriginRequestPolicy "AllViewer" — forward every header
          # (incl. Authorization, Cookie, Host), all cookies, all query strings
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3
          # AWS-managed ResponseHeadersPolicy "SecurityHeadersPolicy"
          ResponseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03

Outputs:
  DistributionId:
    Description: CloudFront distribution id
    Value: !Ref KeycloakDistribution

  DistributionDomainName:
    Description: CloudFront default domain name (Route53 should point KeycloakDomainName here as Alias)
    Value: !GetAtt KeycloakDistribution.DomainName

  CloudFrontHostedZoneId:
    Description: Hosted zone id to use in Route53 Alias target (always Z2FDTNDATAQYW2 for CloudFront)
    Value: Z2FDTNDATAQYW2
